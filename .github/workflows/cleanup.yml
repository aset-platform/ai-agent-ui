name: Cleanup merged branches

on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            // Never delete protected branches even if somehow targeted
            const protected_branches = ['main', 'dev', 'qa', 'release', 'gh-pages'];
            if (protected_branches.includes(branch)) {
              console.log(`Skipping protected branch: ${branch}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (e) {
              console.log(`Could not delete branch ${branch}: ${e.message}`);
            }
