site_name: AI Agent UI
site_description: Fullstack agentic chat application — Next.js frontend + FastAPI backend
site_author: asequitytrading-design
repo_url: https://github.com/asequitytrading-design/ai-agent-ui
repo_name: asequitytrading-design/ai-agent-ui

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  # gen-files removed — scripts need backend Python
  # modules unavailable in docs container. Pre-generate
  # via: python scripts/gen_config_docs.py > docs/backend/config-reference.md
  #      python scripts/gen_api_docs.py > docs/backend/api-reference.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - macOS: setup/macos.md
      - Linux: setup/linux.md
      - Windows (WSL2): setup/windows.md
  - Backend:
      - Overview: backend/overview.md
      - API Reference: backend/api.md
      - API Reference (Auto): backend/api-reference.md
      - Auth & Users: backend/auth.md
      - OAuth / SSO: backend/oauth.md
      - Billing & Subscriptions: backend/billing.md
      - BYOM (Bring Your Own Model): backend/byom.md
      - Agents: backend/agents.md
      - Tools: backend/tools.md
      - Configuration: backend/config.md
      - Config Reference (Auto): backend/config-reference.md
      - Logging: backend/logging.md
  - Stock Agent:
      - Overview: stock_agent.md
      - Iceberg Storage: backend/stocks_iceberg.md
      - Data Pipeline: backend/stock-pipeline.md
      - Scheduler & Pipelines: backend/scheduler.md
      - Maintenance & Data Health: backend/maintenance.md
  - Dashboard:
      - Overview: dashboard/overview.md
  - Frontend:
      - Overview: frontend/overview.md
  - Design:
      - Sentiment Agent: design/DESIGN-sentiment-agent.md
      - Dashboard Overhaul: design/DESIGN-dashboard-overhaul.md
  - Workflow:
      - Sentiment Agent: workflow/WORKFLOW-sentiment-agent.md
      - Dashboard Overhaul: workflow/WORKFLOW-dashboard-overhaul.md
  - Development:
      - How to Run: dev/how-to-run.md
      - E2E Testing: dev/e2e-testing.md
      - Decisions: dev/decisions.md
      - Changelog: dev/changelog.md
