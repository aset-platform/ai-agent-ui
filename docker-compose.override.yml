# ── Dev overrides — hot-reload + source mounts ───────
# Auto-loaded by Docker Compose alongside docker-compose.yml.
# To run production-like (no hot-reload):
#   docker compose -f docker-compose.yml up -d

services:
  backend:
    volumes:
      - ./backend:/app/backend
      - ./auth:/app/auth
      - ./stocks:/app/stocks
      - ./scripts:/app/scripts
      - ./dashboard:/app/dashboard
      - ./fixtures:/app/fixtures
      - ./.pyiceberg.yaml:/app/.pyiceberg.yaml:ro
      - ${AI_AGENT_UI_HOME:-~/.ai-agent-ui}:${AI_AGENT_UI_HOME:-/Users/abhay/.ai-agent-ui}
      - /Users/abhay/Documents/projects/ai-agent-ui-backups:/Users/abhay/Documents/projects/ai-agent-ui-backups
    command: >
      uvicorn main:app
        --host 0.0.0.0 --port 8181
        --reload
        --reload-dir /app/backend
        --reload-dir /app/auth
        --reload-dir /app/stocks

  docs:
    volumes:
      - ./docs:/docs/docs
      - ./mkdocs.yml:/docs/mkdocs.yml

  # Frontend dev container — hot-reload via source mount,
  # built from the Dockerfile.frontend `deps` stage.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: deps
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx next dev --port 3000 --hostname 0.0.0.0
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8181

  # ── Perf profile: prod build + Lighthouse runner ────
  # Not started by default. Launch with:
  #   docker compose --profile perf up -d \
  #       postgres redis backend frontend-perf
  #   docker compose --profile perf run --rm perf
  #
  # `frontend-perf` bakes `NEXT_PUBLIC_BACKEND_URL=` (empty)
  # so `lib/config.ts` resolves `API_URL` to relative `/v1`,
  # and the Next.js `/v1/*` rewrite proxies to
  # `BACKEND_URL=http://backend:8181` at runtime. Zero CORS.
  frontend-perf:
    profiles: ["perf"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Empty baked NEXT_PUBLIC_BACKEND_URL → `lib/config.ts`
        # returns relative `API_URL=/v1` (proxied via rewrite).
        NEXT_PUBLIC_BACKEND_URL: ""
        # Rewrite destination is baked into routes-manifest.json
        # at `next build` — must flow through as a build ARG,
        # not runtime env.
        BACKEND_URL: http://backend:8181
    # Host port 3001 → container port 3000 (frontend's
    # default). Keeps the Dockerfile healthcheck intact
    # while staying off 3000 so the dev `frontend` can
    # run alongside if someone wants both up.
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy

  perf:
    profiles: ["perf"]
    build:
      context: .
      dockerfile: Dockerfile.perf
    depends_on:
      - frontend-perf
    environment:
      # Container-to-container: frontend-perf listens on
      # port 3000 internally; compose DNS resolves the name.
      - PERF_BASE=http://frontend-perf:3000
      - PERF_TEST_EMAIL=${PERF_TEST_EMAIL:-admin@demo.com}
      - PERF_TEST_PASSWORD=${PERF_TEST_PASSWORD:-Admin123!}
    volumes:
      - ./scripts:/app/scripts:ro
      - ./.lighthouseci:/app/.lighthouseci
